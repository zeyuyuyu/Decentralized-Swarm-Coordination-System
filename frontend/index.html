<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmVerse - Join the Hive!</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .achievement-unlock {
            animation: popup 0.5s ease-out;
        }
        @keyframes popup {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        .swarm-node {
            transition: all 0.3s ease;
        }
        .swarm-node:hover {
            transform: scale(1.2);
            filter: brightness(1.2);
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="fixed top-0 right-0 m-4 z-50">
        <div class="bg-purple-900 rounded-lg p-4 shadow-lg">
            <h3 class="text-xl font-bold">Your SwarmRank™</h3>
            <div class="text-4xl font-bold text-purple-400" id="swarm-score">0</div>
            <div class="text-sm">Level: <span id="level">1</span></div>
        </div>
    </div>

    <div id="achievement-popup" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-green-500 rounded-full px-6 py-3 hidden achievement-unlock">
        🏆 Achievement Unlocked!
    </div>

    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">SwarmVerse</h1>
            <p class="text-xl mt-2">Join thousands of players coordinating swarms in real-time!</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-800 rounded-xl p-6 shadow-xl">
                <h2 class="text-2xl font-bold mb-4">Your Swarm Dashboard</h2>
                <div id="swarm-visualization" class="w-full h-96 rounded-lg bg-gray-700"></div>
                <div class="mt-4 flex justify-between">
                    <button onclick="deploySwarmNode()" class="bg-purple-500 hover:bg-purple-600 px-6 py-2 rounded-lg transition-colors pulse">Deploy Node</button>
                    <button onclick="optimizeSwarm()" class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-lg transition-colors">Optimize</button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-gray-800 rounded-xl p-6 shadow-xl">
                    <h2 class="text-2xl font-bold mb-4">Leaderboard 🏆</h2>
                    <div id="leaderboard" class="space-y-2">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <div class="bg-gray-800 rounded-xl p-6 shadow-xl">
                    <h2 class="text-2xl font-bold mb-4">Achievements</h2>
                    <div class="grid grid-cols-2 gap-4" id="achievements">
                        <!-- Achievement badges -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let swarmScore = 0;
        let level = 1;
        const achievements = [
            { id: 'first_node', title: 'First Steps', desc: 'Deploy your first node', icon: '🌟' },
            { id: 'optimization_master', title: 'Optimization Master', desc: 'Optimize swarm 10 times', icon: '⚡' },
            { id: 'swarm_king', title: 'Swarm King', desc: 'Reach level 10', icon: '👑' }
        ];

        function deploySwarmNode() {
            swarmScore += Math.floor(Math.random() * 100) + 50;
            updateScore();
            checkAchievements();
            updateVisualization();
        }

        function optimizeSwarm() {
            swarmScore += Math.floor(Math.random() * 200) + 100;
            updateScore();
            checkAchievements();
            showAchievementPopup('Optimization Complete! +150 points');
        }

        function updateScore() {
            document.getElementById('swarm-score').textContent = swarmScore;
            level = Math.floor(swarmScore / 1000) + 1;
            document.getElementById('level').textContent = level;
        }

        function showAchievementPopup(text) {
            const popup = document.getElementById('achievement-popup');
            popup.textContent = text;
            popup.classList.remove('hidden');
            setTimeout(() => popup.classList.add('hidden'), 3000);
        }

        function checkAchievements() {
            // Achievement logic here
        }

        function updateVisualization() {
            // Three.js visualization logic here
        }

        // Initialize visualization
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(document.getElementById('swarm-visualization').clientWidth, document.getElementById('swarm-visualization').clientHeight);
        document.getElementById('swarm-visualization').appendChild(renderer.domElement);

        // Populate leaderboard with fake data
        const leaderboardData = [
            { name: 'SwarmMaster', score: 15000 },
            { name: 'NodeNinja', score: 12000 },
            { name: 'SwarmLord', score: 10000 }
        ];

        const leaderboard = document.getElementById('leaderboard');
        leaderboardData.forEach((player, index) => {
            const entry = document.createElement('div');
            entry.className = 'flex justify-between items-center bg-gray-700 p-2 rounded';
            entry.innerHTML = `
                <span>${index + 1}. ${player.name}</span>
                <span class="font-bold text-purple-400">${player.score}</span>
            `;
            leaderboard.appendChild(entry);
        });
    </script>
</body>
</html>
